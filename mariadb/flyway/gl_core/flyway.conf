# Flyway configuration for gmcore_core database
flyway.url=jdbc:mariadb://mariadb:3306/gmcore_core
flyway.user=${MARIADB_USER}
flyway.password=${MARIADB_PASSWORD}
flyway.locations=filesystem:/flyway/sql
flyway.baselineOnMigrate=true
flyway.validateOnMigrate=true
flyway.cleanDisabled=true
flyway.encoding=UTF-8
