services:
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "8080:80"
    env_file:
      - .env
    depends_on:
      - php
    links:
      - php
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./.data/nginx:/var/log/nginx
      - ./xenforo:/var/www/html:ro
      - xf_data:/var/www/html/data:ro
      - xf_internal:/var/www/html/internal_data:ro

  php:
    build:
      context: .
      dockerfile: php8.4/Dockerfile
      args:
        ENVIRONMENT: ${ENVIRONMENT:-local}
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - .env
    depends_on:
      mariadb:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-local}
      - XDEBUG_CONFIG=client_host=host.docker.internal client_port=9003
    volumes:
      - ./xenforo:/var/www/html
      - xf_data:/var/www/html/data
      - xf_internal:/var/www/html/internal_data


  mariadb:
    image: mariadb:latest
    env_file:
      - .env
    ports:
      - "3306:3306"
    command:
      # Gotta do this since the .sql files for base XF dump are way too big
      - --innodb-use-native-aio=0
      - --innodb-ft-cache-size=32000000
      - --innodb-ft-result-cache-limit=4000000000
      - --innodb-buffer-pool-size=512M
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "${MARIADB_HOST:-127.0.0.1}", "-uroot", "-p${MARIADB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./.data/mariadb:/var/lib/mysql
      - ./mariadb/initdb:/docker-entrypoint-initdb.d
      - ./mariadb:/dumps

  flyway-gmcore-core:
    build:
      context: .
      dockerfile: flyway/Dockerfile
    env_file:
      - .env
    depends_on:
      mariadb:
        condition: service_healthy
    command: migrate
    restart: "no"

volumes:
  xf_data:
  xf_internal: