<xf:title>{{ phrase('xs_reported_content', {'name': $user.username}) }}</xf:title>

<xf:breadcrumb href="{{ link('reports') }}">{{ phrase('reports') }}</xf:breadcrumb>

<div class="block">
	<div class="block-outer"><xf:trim>
		<xf:pagenav page="{$page}" perpage="{$perPage}" total="{$total}" link="reports/search" params="{{ {'username': $user.username} }}" wrapperclass="block-outer-main" />
	</xf:trim></div>

	<div class="block-container">
		<div class="block-body">
			<div class="structItemContainer">
				<xf:foreach loop="$reports" value="$report">
					<xf:macro id="report_list_macros::item"
						arg-report="{$report}" />
				</xf:foreach>
			</div>
		</div>
	</div>

	<div class="block-outer block-outer--after">
		<xf:pagenav page="{$page}" perpage="{$perPage}" total="{$total}" link="reports/search" params="{{ {'username': $user.username} }}" wrapperclass="block-outer-main" />
		<xf:showignored wrapperclass="block-outer-opposite" />
	</div>
</div>
