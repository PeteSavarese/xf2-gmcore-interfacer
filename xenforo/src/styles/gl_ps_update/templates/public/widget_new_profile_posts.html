<xf:if is="$profilePosts is not empty">
	<xf:macro id="lightbox_macros::setup" arg-canViewAttachments="{$canViewAttachments}" />

	<div class="block"{{ widget_data($widget) }} data-xf-init="lightbox">
		<div class="block-container">
			<xf:if is="$style == 'full'">
				<h3 class="block-header">
					<a href="{$link}" rel="nofollow">{$title}</a>
				</h3>
				<div class="block-body js-replyNewMessageContainer">
					<xf:if is="$xf.visitor.canPostOnProfile()">
						<xf:set var="$firstProfilePost" value="{$profilePosts|first}" />
						<xf:macro id="profile_post_macros::submit"
							arg-user="{$xf.visitor}"
							arg-lastDate="{{ $firstProfilePost.post_date ?: 0 }}"
							arg-containerSelector="< .js-replyNewMessageContainer"
							arg-style="{$style}"
							arg-context="all"
							arg-attachmentData="{$attachmentData}" />
					</xf:if>
					<xf:foreach loop="$profilePosts" value="$profilePost">
						<xf:macro id="profile_post_macros::profile_post"
							arg-profilePost="{$profilePost}"
							arg-attachmentData="{$profilePostAttachData.{$profilePost.profile_post_id}}"
							arg-showTargetUser="{{ true }}"
							arg-allowInlineMod="{{ false }}" />
					</xf:foreach>
				</div>
				<div class="block-footer">
					<span class="block-footer-controls">
						<xf:button href="{$link}" rel="nofollow" class="button--cta button--icon button--icon--preview">{{ phrase('view_more...') }}</xf:button>
					</span>
				</div>
			<xf:else />
				<h3 class="block-minorHeader">
					<a href="{$link}" rel="nofollow">{$title}</a>
				</h3>
				<div class="block-body js-replyNewMessageContainer">
					<xf:if is="$xf.visitor.canPostOnProfile()">
						<xf:set var="$firstProfilePost" value="{$profilePosts|first}" />
						<xf:macro id="profile_post_macros::submit"
							arg-user="{$xf.visitor}"
							arg-lastDate="{{ $firstProfilePost.post_date ?: 0 }}"
							arg-containerSelector="< .js-replyNewMessageContainer"
							arg-style="{$style}"
							arg-context="all"
							arg-attachmentData="{$attachmentData}" />
					</xf:if>
					<xf:foreach loop="$profilePosts" value="$profilePost">
						<div class="block-row">
							<xf:macro id="profile_post_macros::profile_post_simple"
								arg-profilePost="{$profilePost}"
								arg-limitHeight="{{ true }}" />
						</div>
					</xf:foreach>
				</div>
			</xf:if>
		</div>
	</div>
</xf:if>
