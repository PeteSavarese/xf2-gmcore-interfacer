<xf:title>{{ phrase('connected_accounts') }}</xf:title>

<xf:wrap template="account_wrapper" />

<div class="block">
	<div class="block-container">
		<div class="block-body">
			<xf:inforow>{{ phrase('connected_accounts_allow_you_to_log_in_to_this_site_more_easily') }}</xf:inforow>
			<xf:foreach loop="$providers" value="$provider">
				<xf:if is="{$provider.isAssociated($xf.visitor)}">
					<xf:macro id="connected_account_macros::disassociate" arg-provider="{$provider}" arg-hasPassword="{$hasPassword}" />
				<xf:else />
					<xf:macro id="connected_account_macros::associate" arg-provider="{$provider}" />
				</xf:if>
			<xf:else />
				<div class="block-row">{{ phrase('there_currently_no_usable_external_account_providers') }}</div>
			</xf:foreach>
		</div>
	</div>
</div>
