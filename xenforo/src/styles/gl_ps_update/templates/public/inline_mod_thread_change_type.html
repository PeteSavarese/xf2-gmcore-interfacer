<xf:title>{{ phrase('inline_moderation_thread_type') }}</xf:title>

<xf:form action="{{ link('inline-mod') }}" class="block" ajax="true">
	<div class="block-container">
		<div class="block-body">
			<xf:inforow rowtype="confirm">
				<div>{{ phrase('you_sure_you_want_to_change_types_x_threads', {'count': $total}) }}</div>

				<div class="block-rowMessage block-rowMessage--warning">
					{{ phrase('changing_threads_type_warning_desc') }}
				</div>
			</xf:inforow>

			<xf:radiorow name="new_thread_type_id" label="{{ phrase('thread_type_filter') }}">
				<xf:options source="$creatableThreadTypes" />
			</xf:radiorow>
		</div>
		<xf:submitrow icon="confirm" />
	</div>

	<xf:foreach loop="$threads" value="$thread">
		<xf:hiddenval name="ids[]">{$thread.thread_id}</xf:hiddenval>
	</xf:foreach>

	<xf:hiddenval name="type">thread</xf:hiddenval>
	<xf:hiddenval name="action">change_type</xf:hiddenval>
	<xf:hiddenval name="confirmed">1</xf:hiddenval>

	<xf:redirect url="{$redirect}" />
</xf:form>
