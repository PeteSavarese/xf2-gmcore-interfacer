<xf:title>{{ phrase('request_password') }}</xf:title>

<xf:form action="{{ link('account/request-password') }}" class="block" ajax="true">

	<div class="block-container">
		<div class="block-body">
			<xf:inforow rowtype="confirm">
				{{ phrase('your_account_does_not_currently_have_password_confirm_generate', {'email': $xf.visitor.email|email_display}) }}
			</xf:inforow>
		</div>

		<xf:submitrow submit="{{ phrase('request_password') }}" rowtype="simple" />
	</div>

</xf:form>
