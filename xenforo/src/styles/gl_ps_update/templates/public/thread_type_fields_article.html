<xf:if is="$context == 'create' AND $subContext == 'quick'">
	<xf:set var="$rowType" value="fullWidth noGutter mergeNext" />
<xf:elseif is="$context == 'edit' AND $subContext == 'first_post_quick'" />
	<xf:set var="$rowType" value="fullWidth mergeNext" />
<xf:else />
	<xf:set var="$rowType" value="" />
</xf:if>

<xf:set var="$show" value="{{
	$thread.Forum.forum_type_id == 'article'
	AND ($context != 'edit' OR $subContext != 'thread')
}}" />
<xf:if is="$show">
	<xf:formrow label="{{ phrase('article_cover_note_label') }}" rowtype="{$rowType}">
		<span class="u-muted">{{ phrase('article_cover_note_explain') }}</span>
	</xf:formrow>
</xf:if>
