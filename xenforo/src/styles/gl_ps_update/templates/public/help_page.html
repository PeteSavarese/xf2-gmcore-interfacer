<xf:title>{$page.title}</xf:title>

<xf:macro id="metadata_macros::metadata"
	arg-canonicalUrl="{{ link('canonical:help', $page) }}"
	arg-description="{$page.description}" />

<xf:breadcrumb href="{{ link('help') }}">{{ phrase('help') }}</xf:breadcrumb>

<xf:wrap template="help_wrapper" />

<xf:if is="$page.advanced_mode">
	{$templateHtml|raw}
<xf:else />
	<div class="block">
		<div class="block-container">
			<div class="block-body block-row">
				{$templateHtml|raw}
			</div>
		</div>
	</div>
</xf:if>
