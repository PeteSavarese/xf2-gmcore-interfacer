<xf:title>{{ phrase('reset_password') }}</xf:title>

<xf:head option="robots"><meta name="robots" content="noindex" /></xf:head>

<div class="blockMessage blockMessage--important">
	{{ phrase('we_require_you_to_change_your_password') }}
</div>

<xf:form action="{{ link('security-lock/reset', $user, {'c': $c}) }}" class="block" ajax="true">
	<div class="block-container">
		<div class="block-body">
			<xf:formrow label="{{ phrase('user_name') }}">{$user.username}</xf:formrow>

			<xf:passwordboxrow name="password" autocomplete="new-password" checkstrength="true"
				label="{{ phrase('new_password') }}" />

			<xf:passwordboxrow name="password_confirm" autocomplete="new-password"
				label="{{ phrase('confirm_new_password') }}" />
		</div>
		<xf:submitrow icon="save" />
	</div>
</xf:form>
