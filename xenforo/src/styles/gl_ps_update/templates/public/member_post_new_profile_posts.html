<xf:if is="$firstUnshownProfilePost">
	<div class="message message--simple">
		<div class="message-inner">
			<div class="message-cell message-cell--alert">
				{{ phrase('there_more_posts_to_display') }} <a href="{{ link('profile-posts', $firstUnshownProfilePost) }}">{{ phrase('view_them') }}</a>
			</div>
		</div>
	</div>
</xf:if>

<xf:foreach loop="$profilePosts" value="$profilePost">
	<xf:if is="$style == 'simple'">
		<div class="block-row">
			<xf:macro id="profile_post_macros::profile_post_simple"
				arg-profilePost="{$profilePost}" />
		</div>
	<xf:else />
		<xf:macro id="profile_post_macros::profile_post"
			arg-attachmentData="{$profilePostAttachData.{$profilePost.profile_post_id}}"
			arg-profilePost="{$profilePost}" />
	</xf:if>
</xf:foreach>
